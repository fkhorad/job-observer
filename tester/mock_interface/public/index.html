<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Simple Job Runner</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 40px;
      background-color: #f4f4f4;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }

    #status-container div {
      margin-top: 20px;
      padding: 10px;
      background: white;
      border-radius: 5px;
      min-height: 40px;
    }
  </style>
</head>
<body>

  <h2>Start Jobs</h2>
  <button id="start-btn-1" data-val="mock">Mock service 1</button>
  <button id="start-btn-2" data-val="mock_clone">Mock service 2</button>

  <div id="status-container">
    <div id="status-placeholder">Idle</div>
  </div>
  <script type="module" src="index.js"></script>


</body>
</html>
