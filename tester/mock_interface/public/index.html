<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Simple Job Runner</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 40px;
      background-color: #f4f4f4;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }

    #status {
      margin-top: 20px;
      padding: 10px;
      background: white;
      border-radius: 5px;
      min-height: 40px;
    }
  </style>
</head>
<body>

  <h2>Start Job</h2>
  <button id="startBtn-1">Start Job</button>

  <div id="status">Idle</div>

  <script>
    const startBtn1 = document.getElementById("startBtn-1");
    const startBtn2 = document.getElementById("startBtn-2");
    const statusDiv = document.getElementById("status");

    let pollingInterval = null;

    // ---- MOCK ENDPOINT URLs ----
    const FIRST_POST_ENDPOINT = "/api/first/job";
    const FIRST_SECOND_ENDPOINT = "/api/second/job";
    const POLLING_REGISTRATION_ENDPOINT = "/api/add_job";
    const POLL_ENDPOINT = "/api/job_status";

    startBtn1.addEventListener("click", startJob);


    async function startJob(){

      try {
        // ---- POST REQUEST ----
        const response = await fetch(FIRST_POST_ENDPOINT, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({})
        });

        const data = await response.json();

        const jobId = data.job_id;
        statusDiv.innerText = "Job started. JobID: " + jobId;

        // Register to polling service
        const requestBody = {
          job_id: jobId,
          service: "mock"
        };

        const reg_res = await fetch(POLLING_REGISTRATION_ENDPOINT, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(requestBody)
        });

        startPolling(jobId);

      } catch (error) {
        statusDiv.innerText = "Error starting job.";
        console.error(error);
      }
    }

    function startPolling(jobId) {
      let counter = 0;

      pollingInterval = setInterval(async () => {
        counter++;
        statusDiv.innerText = "Checking status for " + jobId + "...";

        try {
          // ---- GET REQUEST ----
          const response = await fetch(`${POLL_ENDPOINT}?job_id=${jobId}`);

          // ---- MOCK STATUS RESPONSE ----
          const response_data = await response.json();
          console.log('Check status data', response_data);
          const data_list = response_data['jobs']
          console.log('Check status data', data_list);
          const data = data_list.length ? data_list[0] : {'observed_state': 'unknown'};

          statusDiv.innerText = `Service mock Job ${jobId} status: ${data.observed_state}`;

          if (data.is_terminal) {
            clearInterval(pollingInterval);
            statusDiv.innerText += " ✅ Done!";
          }

        } catch (error) {
          statusDiv.innerText = "Error checking job status.";
          console.error(error);
        }

      }, 4000); // every 2 seconds
    }
  </script>

</body>
</html>
